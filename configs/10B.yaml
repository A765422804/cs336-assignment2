model:
  vocab_size: 10000
  context_length: 512
  d_model: 4608
  num_layers: 50
  num_heads: 36
  d_ff: 12288
  rope_theta: 10000

optimizer:
  lr: 0.001 
  betas: [0.9, 0.95]
  eps: 0.00000001
  weight_decay: 0.01

data:
  batch_size: 4

runtime:
  device: cuda

benchmark:
  warmup_steps: 5
  measured_steps: 10
  mode: forward # forward forward_backward full_step