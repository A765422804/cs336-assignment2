model:
  vocab_size: 100
  context_length: 64
  d_model: 32
  num_layers: 10
  num_heads: 4
  d_ff: 128
  rope_theta: 10000

optimizer:
  lr: 0.001 
  betas: [0.9, 0.95]
  eps: 0.00000001
  weight_decay: 0.01

data:
  batch_size: 2

runtime:
  device: cuda

benchmark:
  warmup_steps: 10
  measured_steps: 10
  mode: forward_backward # forward forward_backward full_step