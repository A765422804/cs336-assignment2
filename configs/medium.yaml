model:
  vocab_size: 10000
  context_length: 1024
  d_model: 1024
  num_layers: 24
  num_heads: 16
  d_ff: 4096
  rope_theta: 10000

optimizer:
  lr: 0.001 
  betas: [0.9, 0.95]
  eps: 0.00000001
  weight_decay: 0.01

data:
  batch_size: 4

runtime:
  device: cuda

benchmark:
  warmup_steps: 2
  measured_steps: 10
  mode: full_step # forward forward_backward full_step