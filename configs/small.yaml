model:
  model_type: small
  vocab_size: 10000
  context_length: 768
  d_model: 768
  num_layers: 12
  num_heads: 12
  d_ff: 3072
  rope_theta: 10000

optimizer:
  lr: 0.001 
  betas: [0.9, 0.95]
  eps: 0.00000001
  weight_decay: 0.01

data:
  batch_size: 4

runtime:
  device: cuda
  use_mixed_precision: True
  profile_memory: True

benchmark:
  warmup_steps: 5
  measured_steps: 5
  mode: forward # forward forward_backward full_step